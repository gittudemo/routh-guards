<h2>Login Form</h2>

<div>
  <label>Email</label>
  <input type="email" [(ngModel)]="email" placeholder="Enter Email" />
</div>

<br />

<div>
  <label>Password</label>
  <input type="password" [(ngModel)]="password" placeholder="Enter Password" />
</div>

<br />

<button (click)="submit()">Login</button>

<pre>{{ email() | json }} </pre>
